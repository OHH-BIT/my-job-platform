# EdgeOne Pages 部署配置
# 此文件定义前端项目的构建触发条件和缓存策略

# ============================
# 构建配置
# ============================
[build]
  # 构建命令：预处理脚本内部包含 next build（临时移出不兼容文件、构建、恢复）
  command = "node prepare-build.js"

  # 构建输出目录（Next.js 静态导出默认输出到 out/）
  output_directory = "out"

  # 安装依赖命令
  install_command = "npm ci --prefer-offline"

  # Node.js 版本（React 19 / Next.js 16 需要 Node 20+）
  node_version = "20"

# ============================
# 构建缓存策略
# ============================
# 仅缓存 node_modules，避免缓存与构建配置冲突
# next.config.mjs 已配置固定 generateBuildId，无需缓存 .next/cache

[cache]
  # node_modules：npm 依赖包缓存
  # 只要 package-lock.json 不变，即可直接复用
  [[cache.paths]]
    path = "node_modules"
    key = "package-lock.json"

# ============================
# 环境变量（按需配置）
# ============================
[env]
  # 如需在 EdgeOne 构建时使用环境变量，在此处声明
  # 实际值请在 EdgeOne 控制台的「环境变量」面板中设置
  # NEXT_PUBLIC_API_URL = "https://your-api-domain.com"
  # NODE_ENV = "production"
